# Host nginx reverse proxy for crypto-finance-tracker.
#
# Install: copy this file to /etc/nginx/sites-available/crypto-tracker,
# symlink into /etc/nginx/sites-enabled/, then `nginx -t && systemctl reload nginx`.
#
# `server_name _;` is a catch-all for IP-only access. Once you have a domain,
# replace it with `server_name yourdomain.com;` and add TLS via certbot
# (`certbot --nginx -d yourdomain.com`).

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # API container - path passthrough, matches the API's own /api/v1 prefix.
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for the extension status SSE stream (text/event-stream).
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Web app container.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
